repos:
  - repo: local
    hooks:
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: uv run --project shopping-assistant end-of-file-fixer
        language: system
        types: [text]
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: uv run --project shopping-assistant trailing-whitespace-fixer
        language: system
        types: [text]
      - id: semgrep
        name: semgrep
        entry: uv run --project shopping-assistant semgrep scan --error --config shopping-assistant/.semgrep/rules.yaml
        language: system
        types: [python]
